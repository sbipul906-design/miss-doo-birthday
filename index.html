<!DOCTYPE html>
<html>
<head>
<title>For Miss Doo ❤️</title>

<style>
body {
  margin:0;
  padding:0;
  font-family: 'Poppins', sans-serif;
  height:100vh;
  overflow:hidden;
}

/* Background Image */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: url('photo4.jpg') center/cover no-repeat;
  filter: brightness(0.4);
}

/* Content */
.content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  color:white;
}

/* Heading */
h1 {
  font-size:45px;
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
}

/* Typing text */
#typing {
  font-size:22px;
  margin-top:15px;
}

/* Button */
button {
  margin-top:30px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg,#ff4d6d,#ff758c);
  color:white;
  cursor:pointer;
  box-shadow: 0 0 20px rgba(255,77,109,0.8);
  transition:0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* Floating Hearts */
.heart {
  position:fixed;
  bottom:0;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-800px); opacity:0; }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="content">
  <h1>Miss Doo ❤️</h1>
  <div id="typing"></div>
  <button onclick="start()">Start Our Story 💖</button>
</div>

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
// Typing Effect
let text = "A small surprise for the most special person in my life...";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 60);
  }
}
type();

// Start Button
function start() {
  document.getElementById("music").play();
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "story.html";
  }, 1000);
}

// Floating Hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
